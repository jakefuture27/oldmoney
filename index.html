<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="$BEDROCK - Unbreakable">
    <title>$BEDROCK | Unbreakable</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <div class="star-texture"></div>

    <!-- Minecraft Loading Screen -->
    <div id="intro-screen" class="mc-loading-container">
        <div class="mc-loading-content">
            <h1 class="mc-title">Generating World...</h1>
            <p class="mc-subtitle">Building terrain</p>
            <div class="mc-progress-box">
                <div id="mc-progress-bar" class="mc-progress-fill"></div>
            </div>
            <button id="enter-btn" class="mc-btn hidden">JOIN SERVER</button>
        </div>
    </div>

    <!-- Main Site Content (Hidden Initially) -->
    <div id="main-site" style="display: none;">

        <!-- Navbar -->
        <nav class="navbar">
            <div class="nav-logo">$BEDROCK</div>
            <div class="nav-links">
                <a href="#about">ABOUT</a>
            </div>
        </nav>

        <!-- Floating Background Elements -->
        <div class="floating-balls" id="floating-balls-container"></div>
        <div class="marquee-container">
            <div class="marquee-content mc-text">
                UNBREAKABLE $BEDROCK UNBREAKABLE $BEDROCK UNBREAKABLE $BEDROCK
            </div>
        </div>

        <!-- Hero Section -->
        <section class="hero-section">
            <div class="net-worth-display">Net Worth: $<span id="net-worth">0</span></div>
            
            <div class="hero-image-container mc-hover">
                <img src="./bedrock.png" alt="Bedrock Block" id="main-logo" class="hero-image" onerror="this.src='https://via.placeholder.com/400x400/222222/ffffff?text=Save+image+as+bedrock.png'">
            </div>

            <h1 class="hero-title mc-text">$BEDROCK</h1>
            <h2 class="hero-subtitle">UNBREAKABLE</h2>
            <p class="hero-subtext">The absolute floor. We never break.</p>
            
            <div class="hero-buttons">
                <button class="btn-solid">BUY $BEDROCK</button>
            </div>
        </section>

        <div class="scroll-down">scroll down</div>

        <!-- Unbreakable Floor Animation -->
        <div class="unbreakable-floor-container">
            <div class="pickaxe-animation">
                <div class="pickaxe">⛏️</div>
                <div class="spark">✨</div>
            </div>
            <div class="bedrock-floor"></div>
        </div>

    </div> <!-- End Main Site -->

    <script src="script.js"></script>
</body>
</html>
